<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Green Alien Invasion</title>
    <style>
        /* Changed background to dark grey to help the green stand out */
        body { margin: 0; background: #222; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #111; border: 3px solid #444; display: none; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        #boot-screen { text-align: center; border: 2px solid #00ff00; padding: 30px; border-radius: 10px; background: #333; }
        .btn { background: #00ff00; color: #000; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <h1 style="color: #00ff00;">MISSION START</h1>
        <p>Use Arrows to Move | Space to Shoot</p>
        <button id="startBtn" class="btn">LAUNCH GAME</button>
    </div>

    <div id="hud" style="position: absolute; top: 10px; font-size: 24px; color: #00ff00; display: none; font-weight: bold;">Score: 0 | Level: 1</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const hud = document.getElementById('hud');

        canvas.width = 800;
        canvas.height = 600;

        // --- ASSETS ---
        const gunImg = new Image();
        const alienImg = new Image();
        let gunLoaded = false;
        let alienLoaded = false;

        // Still trying to load your images in the background
        gunImg.src = 'gun.png';
        alienImg.src = 'aliens_sheet.png';

        gunImg.onload = () => gunLoaded = true;
        alienImg.onload = () => alienLoaded = true;

        // --- GAME STATE ---
        let score = 0, level = 1, alienSpeed = 2.5, gameOver = false;
        const player = { x: 370, y: 500, w: 60, h: 80 };
        const bullets = [], aliens = [], keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        startBtn.onclick = () => {
            document.getElementById('boot-screen').style.display = 'none';
            hud.style.display = 'block';
            canvas.style.display = 'block';
            gameLoop();
        };

        function update() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 10;
            if (keys['ArrowRight'] && player.x < 740) player.x += 10;
            if (keys['Space'] && (bullets.length === 0 || bullets[bullets.length-1].y < 450)) {
                bullets.push({x: player.x + 25, y: player.y, w: 10, h: 20});
            }

            bullets.forEach((b, i) => { b.y -= 15; if (b.y < -20) bullets.splice(i, 1); });

            if (Math.random() < 0.02 + (level * 0.005)) {
                aliens.push({x: Math.random() * 750, y: -60, w: 50, h: 50});
            }

            aliens.forEach((a, i) => {
                a.y += alienSpeed;
                if (a.y > 600) aliens.splice(i, 1);
                
                bullets.forEach((b, bi) => {
                    if (b.x < a.x + a.w && b.x + b.w > a.x && b.y < a.y + a.h && b.y + b.h > a.y) {
                        aliens.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        if (score % 100 === 0) { level++; alienSpeed += 0.5; }
                    }
                });

                if (a.x < player.x + player.w && a.x + a.w > player.x && a.y < player.y + player.h && a.y + a.h > player.y) {
                    gameOver = true;
                    alert("GAME OVER! Final Score: " + score);
                    location.reload();
                }
            });
            hud.innerText = `Score: ${score} | Level: ${level}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Player (Gun)
            if (gunLoaded) {
                ctx.save();
                ctx.translate(player.x + 30, player.y + 40);
                ctx.rotate(-Math.PI/2);
                ctx.drawImage(gunImg, -40, -30, 80, 60);
                ctx.restore();
            } else {
                // BRIGHT SOLID GREEN BOX
                ctx.fillStyle = "#00FF00"; 
                ctx.fillRect(player.x, player.y, player.w, player.h);
                // White highlight so it looks like a 3D block
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.strokeRect(player.x, player.y, player.w, player.h);
            }

            // 2. Draw Bullets (Bright White-Green)
            ctx.fillStyle = "#CCFFCC";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // 3. Draw Aliens
            aliens.forEach(a => {
                if (alienLoaded) {
                    let sw = alienImg.width / 3;
                    let sh = alienImg.height / 2;
                    ctx.drawImage(alienImg, 0, 0, sw, sh, a.x, a.y, a.w, a.h);
                } else {
                    // BRIGHT SOLID GREEN CIRCLE
                    ctx.fillStyle = "#00FF00";
                    ctx.beginPath();
                    ctx.arc(a.x + 25, a.y + 25, 25, 0, Math.PI*2);
                    ctx.fill();
                    // White border for visibility
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            });
        }

        function gameLoop() {
            if (!gameOver) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
