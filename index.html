<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alien Invasion - Visibility Check</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #000510; border: 4px solid #ffffff; display: none; box-shadow: 0 0 30px rgba(255,255,255,0.5); }
        #setup { text-align: center; background: #333; padding: 30px; border-radius: 15px; }
        .btn { background: #00ff00; color: #000; padding: 20px 40px; font-size: 24px; font-weight: bold; border: none; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>VISIBILITY TEST</h1>
        <p>If images fail, you will see bright shapes.</p>
        <button id="startBtn" class="btn">START GAME</button>
    </div>

    <div id="stats" style="position: absolute; top: 10px; left: 10px; color: yellow; font-size: 20px; display: none;"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stats = document.getElementById('stats');

        canvas.width = 800;
        canvas.height = 600;

        // --- ASSETS ---
        const gunImg = new Image();
        const alienImg = new Image();
        let gunLoaded = false;
        let alienLoaded = false;

        gunImg.src = 'gun.png';
        alienImg.src = 'aliens_sheet.png';

        gunImg.onload = () => { gunLoaded = true; console.log("Gun Image Detected"); };
        alienImg.onload = () => { alienLoaded = true; console.log("Alien Image Detected"); };

        // --- GAME STATE ---
        let score = 0, level = 1, gameOver = false;
        const player = { x: 370, y: 500, w: 60, h: 80 };
        const bullets = [], aliens = [], keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        startBtn.onclick = () => {
            document.getElementById('setup').style.display = 'none';
            canvas.style.display = 'block';
            stats.style.display = 'block';
            gameLoop();
        };

        function update() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 10;
            if (keys['ArrowRight'] && player.x < 740) player.x += 10;
            if (keys['Space'] && (bullets.length === 0 || bullets[bullets.length-1].y < 450)) {
                bullets.push({x: player.x + 25, y: player.y, w: 10, h: 20});
            }

            bullets.forEach((b, i) => { b.y -= 15; if (b.y < -20) bullets.splice(i, 1); });

            if (Math.random() < 0.03) {
                aliens.push({x: Math.random() * 750, y: -50, w: 50, h: 50});
            }

            aliens.forEach((a, i) => {
                a.y += 3;
                if (a.y > 600) aliens.splice(i, 1);
                
                // Bullet Collision
                bullets.forEach((b, bi) => {
                    if (b.x < a.x + a.w && b.x + b.w > a.x && b.y < a.y + a.h && b.y + b.h > a.y) {
                        aliens.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                    }
                });

                // Player Collision
                if (a.x < player.x + player.w && a.x + a.w > player.x && a.y < player.y + player.h && a.y + a.h > player.y) {
                    gameOver = true;
                }
            });

            stats.innerText = `Score: ${score} | Level: ${level} | Images: ${gunLoaded ? 'OK' : 'MISSING'}`;
        }

        function draw() {
            // Clear with a slight trail effect
            ctx.fillStyle = "rgba(0, 5, 20, 0.3)";
            ctx.fillRect(0, 0, 800, 600);

            // Draw some stars so we know the screen is working
            ctx.fillStyle = "white";
            for(let i=0; i<10; i++) {
                ctx.fillRect(Math.random()*800, Math.random()*600, 2, 2);
            }

            // 1. DRAW PLAYER (GUN)
            if (gunLoaded) {
                ctx.save();
                ctx.translate(player.x + 30, player.y + 40);
                ctx.rotate(-Math.PI/2);
                ctx.drawImage(gunImg, -40, -30, 80, 60);
                ctx.restore();
            } else {
                // BRIGHT MAGENTA BOX if image fails
                ctx.fillStyle = "#ff00ff";
                ctx.fillRect(player.x, player.y, player.w, player.h);
                ctx.strokeStyle = "white";
                ctx.strokeRect(player.x, player.y, player.w, player.h);
            }

            // 2. DRAW BULLETS (ELECTRIC BLUE)
            ctx.fillStyle = "#00ffff";
            bullets.forEach(b => {
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00ffff";
            });
            ctx.shadowBlur = 0; // reset shadow

            // 3. DRAW ALIENS
            aliens.forEach(a => {
                if (alienLoaded) {
                    let sw = alienImg.width / 3;
                    let sh = alienImg.height / 2;
                    ctx.drawImage(alienImg, 0, 0, sw, sh, a.x, a.y, a.w, a.h);
                } else {
                    // BRIGHT ORANGE CIRCLE if image fails
                    ctx.fillStyle = "#ffaa00";
                    ctx.beginPath();
                    ctx.arc(a.x + 25, a.y + 25, 25, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = "white";
                    ctx.stroke();
                }
            });

            if (gameOver) {
                ctx.fillStyle = "white";
                ctx.font = "50px Arial";
                ctx.fillText("GAME OVER", 250, 300);
                setTimeout(() => location.reload(), 2000);
            }
        }

        function gameLoop() {
            if (!gameOver) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
