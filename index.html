<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alien Invasion - Fixed Assets</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #loading-screen { text-align: center; background: #111; padding: 40px; border: 1px solid #333; border-radius: 10px; }
        canvas { border: 1px solid #00ffcc; display: none; background: black; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        .btn { background: #00ffcc; color: black; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; font-weight: bold; margin-top: 20px; border-radius: 5px; }
        .btn:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 id="title">SYSTEM INITIALIZING...</h1>
        <p id="status">Waiting for alien signal...</p>
        <button id="startBtn" class="btn" style="display:none;">START MISSION</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        canvas.width = 800;
        canvas.height = 600;

        // --- ASSET LOADING WITH FAIL-SAFES ---
        const gunImg = new Image();
        const alienImg = new Image();
        let gunReady = false;
        let alienReady = false;

        // Make sure these filenames match exactly what you have in GitHub/Netlify
        gunImg.src = 'gun.png';
        alienImg.src = 'aliens_sheet.png';

        gunImg.onload = () => { gunReady = true; checkLoading(); };
        alienImg.onload = () => { alienReady = true; checkLoading(); };

        // Fallback for slow connections
        function checkLoading() {
            if (gunReady && alienReady) {
                status.innerText = "All assets detected.";
                startBtn.style.display = 'inline-block';
            }
        }

        // If one fails, the game will still let you start after 3 seconds
        setTimeout(() => {
            if (!startBtn.style.display || startBtn.style.display === 'none') {
                status.innerText = "Slow connection. Proceeding with backup graphics...";
                startBtn.style.display = 'inline-block';
            }
        }, 3500);

        // --- GAME VARIABLES ---
        let score = 0, level = 1, alienSpeed = 2.5, gameOver = false;
        const player = { x: 370, y: 500, w: 60, h: 80 };
        const bullets = [], aliens = [], keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        startBtn.onclick = () => {
            document.getElementById('loading-screen').style.display = 'none';
            canvas.style.display = 'block';
            gameLoop();
        };

        function update() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 9;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += 9;
            
            if (keys['Space'] && (bullets.length === 0 || bullets[bullets.length-1].y < player.y - 120)) {
                bullets.push({x: player.x + 27, y: player.y, w: 6, h: 16});
            }

            bullets.forEach((b, i) => { b.y -= 12; if (b.y < -20) bullets.splice(i, 1); });

            if (Math.random() < 0.02 + (level * 0.005)) {
                aliens.push({x: Math.random() * (canvas.width - 50), y: -60, w: 55, h: 55});
            }

            aliens.forEach((a, i) => {
                a.y += alienSpeed;
                if (a.y > canvas.height) aliens.splice(i, 1);

                bullets.forEach((b, bi) => {
                    if (b.x < a.x + a.w && b.x + b.w > a.x && b.y < a.y + a.h && b.y + b.h > a.y) {
                        aliens.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        if (score % 100 === 0) { level++; alienSpeed += 0.4; }
                    }
                });

                if (a.x < player.x + player.w && a.x + a.w > player.x && a.y < player.y + player.h && a.y + a.h > player.y) {
                    gameOver = true;
                    alert(`GAME OVER\nFinal Score: ${score}`);
                    location.reload();
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00ffcc";
            ctx.font = "18px 'Courier New'";
            ctx.fillText(`SCORE: ${score} | LEVEL: ${level}`, 20, 30);

            // Draw Bullets
            ctx.fillStyle = "yellow";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // DRAW ALIEN
            aliens.forEach(a => {
                if (alienReady) {
                    // This logic automatically calculates the first alien's position 
                    // regardless of the overall sheet resolution.
                    let sourceW = alienImg.width / 3;  // Assumes 3 columns
                    let sourceH = alienImg.height / 2; // Assumes 2 rows
                    ctx.drawImage(alienImg, 0, 0, sourceW, sourceH, a.x, a.y, a.w, a.h);
                } else {
                    // Backup if image fails
                    ctx.fillStyle = "red";
                    ctx.beginPath();
                    ctx.arc(a.x + a.w/2, a.y + a.h/2, a.w/2, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            // DRAW GUN
            if (gunReady) {
                ctx.save();
                ctx.translate(player.x + player.w/2, player.y + player.h/2);
                ctx.rotate(-Math.PI/2);
                ctx.drawImage(gunImg, -player.h/2, -player.w/2, player.h, player.w);
                ctx.restore();
            } else {
                ctx.fillStyle = "#00ffcc";
                ctx.fillRect(player.x, player.y, player.w, player.h);
            }
        }

        function gameLoop() {
            if (!gameOver) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
