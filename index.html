<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alien Invasion - Solved!</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #00d4ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #000; border: 2px solid #00d4ff; display: none; box-shadow: 0 0 15px #00d4ff; }
        #menu { text-align: center; border: 1px solid #333; padding: 30px; border-radius: 10px; background: #111; }
        button { background: #00d4ff; color: black; border: none; padding: 10px 25px; font-size: 18px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #fff; }
        #status { font-size: 14px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>ALIEN INVASION</h1>
        <div id="status">Scanning for Aliens...</div>
        <button id="startBtn" style="display:none;">LAUNCH GAME</button>
    </div>

    <div id="ui" style="position: absolute; top: 10px; display:none; font-size: 20px;">Score: 0 | Level: 1</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        canvas.width = 800;
        canvas.height = 600;

        // --- ASSET MANAGEMENT ---
        let gunImg = new Image();
        let alienImg = new Image(); // This will load your new image_4.png
        let gunLoaded = false;
        let alienLoaded = false;

        // --- IMPORTANT: RENAME YOUR FILES TO MATCH THESE ---
        gunImg.src = 'gun.png';
        alienImg.src = 'alien.png'; // Renamed image_4.png to alien.png

        gunImg.onload = () => { gunLoaded = true; checkAllLoaded(); };
        alienImg.onload = () => { alienLoaded = true; checkAllLoaded(); };

        // Error checking (alerts you if filenames don't match)
        gunImg.onerror = () => status.innerText = "Error: Cannot find gun.png";
        alienImg.onerror = () => status.innerText = "Error: Cannot find alien.png";

        function checkAllLoaded() {
            if (gunLoaded && alienLoaded) {
                status.innerText = "All Systems Go!";
                startBtn.style.display = "inline-block";
            }
        }

        // --- GAME LOGIC ---
        let score = 0, level = 1, alienSpeed = 2, gameOver = false;
        const player = { x: 370, y: 500, w: 60, h: 80 };
        const bullets = [], aliens = [], keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        startBtn.onclick = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            canvas.style.display = 'block';
            animate();
        };

        function update() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 8;
            if (keys['ArrowRight'] && player.x < 740) player.x += 8;
            if (keys['Space']) {
                if (bullets.length === 0 || bullets[bullets.length-1].y < 400) {
                    bullets.push({x: player.x + 27, y: player.y, w: 6, h: 15});
                }
            }

            bullets.forEach((b, i) => { b.y -= 10; if (b.y < 0) bullets.splice(i, 1); });

            // Respawning aliens
            if (Math.random() < 0.02 + (level * 0.005)) {
                // Aliens are a bit wider now for the new sprite
                aliens.push({x: Math.random() * 730, y: -60, w: 70, h: 60});
            }

            aliens.forEach((a, i) => {
                a.y += alienSpeed;
                if (a.y > 600) aliens.splice(i, 1);
                
                // Bullet hit
                bullets.forEach((b, bi) => {
                    if (b.x < a.x + a.w && b.x + b.w > a.x && b.y < a.y + a.h && b.y + b.h > a.y) {
                        aliens.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        if (score % 100 === 0) { level++; alienSpeed += 0.5; }
                    }
                });

                // Player hit
                if (a.x < player.x + player.w && a.x + a.w > player.x && a.y < player.y + player.h && a.y + a.h > player.y) {
                    gameOver = true;
                }
            });
            document.getElementById('ui').innerText = `Score: ${score} | Level: ${level}`;
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);

            // Draw Gun
            if (gunLoaded) {
                ctx.save();
                ctx.translate(player.x + 30, player.y + 40);
                ctx.rotate(-Math.PI/2);
                ctx.drawImage(gunImg, -40, -30, 80, 60);
                ctx.restore();
            } else {
                ctx.fillStyle = 'lime';
                ctx.fillRect(player.x, player.y, 60, 80);
            }

            // Draw Bullets
            ctx.fillStyle = 'yellow';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Draw Aliens (This is the critical fix)
            aliens.forEach(a => {
                if (alienLoaded) {
                    // We draw the entire image (no cropping)
                    ctx.drawImage(alienImg, a.x, a.y, a.w, a.h);
                } else {
                    ctx.fillStyle = 'red';
                    ctx.beginPath();
                    ctx.arc(a.x + 35, a.y + 30, 25, 0, Math.PI*2);
                    ctx.fill();
                }
            });

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0,0,800,600);
                ctx.fillStyle = 'white';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText("MISSION FAILED", 400, 300);
                ctx.font = '24px Arial';
                ctx.fillText(`Final Score: ${score}`, 400, 350);
            }
        }

        function animate() {
            if (!gameOver) {
                update();
                draw();
                requestAnimationFrame(animate);
            }
        }
    </script>
</body>
</html>
