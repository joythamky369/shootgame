<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alien Invasion - Fail-Safe Edition</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 1px solid #00ffcc; background: black; display: none; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
        #menu { text-align: center; border: 1px solid #333; padding: 40px; border-radius: 12px; background: #111; }
        .btn { background: #00ffcc; color: black; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; font-weight: bold; border-radius: 5px; margin-top: 20px; }
        .btn:hover { background: #fff; transform: scale(1.05); }
        #status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>ALIEN INVASION</h1>
        <div id="status">Syncing with satellite...</div>
        <button id="startBtn" class="btn">LAUNCH MISSION</button>
    </div>

    <div id="ui" style="position: absolute; top: 15px; display:none; font-size: 22px;">Score: 0 | Level: 1</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        canvas.width = 800;
        canvas.height = 600;

        // --- ASSET LOADING ---
        const gunImg = new Image();
        const alienImg = new Image();
        let gunLoaded = false;
        let alienLoaded = false;

        // Ensure these match your filenames exactly (lowercase recommended)
        gunImg.src = 'gun.png';
        alienImg.src = 'aliens_sheet.png';

        gunImg.onload = () => { gunLoaded = true; console.log("Gun Ready"); };
        alienImg.onload = () => { alienLoaded = true; console.log("Aliens Ready"); };

        // --- GAME VARIABLES ---
        let score = 0, level = 1, alienSpeed = 2.5, gameOver = false;
        const player = { x: 370, y: 500, w: 60, h: 80 };
        const bullets = [], aliens = [], keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        startBtn.onclick = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            canvas.style.display = 'block';
            gameLoop();
        };

        function update() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 9;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += 9;
            
            // Shooting logic
            if (keys['Space'] && (bullets.length === 0 || bullets[bullets.length-1].y < player.y - 120)) {
                bullets.push({x: player.x + 27, y: player.y, w: 6, h: 16});
            }

            bullets.forEach((b, i) => { b.y -= 12; if (b.y < -20) bullets.splice(i, 1); });

            // Spawn aliens
            if (Math.random() < 0.02 + (level * 0.005)) {
                aliens.push({x: Math.random() * (canvas.width - 55), y: -60, w: 55, h: 55});
            }

            aliens.forEach((a, i) => {
                a.y += alienSpeed;
                if (a.y > canvas.height) aliens.splice(i, 1);

                // Collision: Bullet hits Alien
                bullets.forEach((b, bi) => {
                    if (b.x < a.x + a.w && b.x + b.w > a.x && b.y < a.y + a.h && b.y + b.h > a.y) {
                        aliens.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        if (score % 100 === 0) { level++; alienSpeed += 0.4; }
                    }
                });

                // Collision: Alien hits Gun
                if (a.x < player.x + player.w && a.x + a.w > player.x && a.y < player.y + player.h && a.y + a.h > player.y) {
                    gameOver = true;
                    alert(`SYSTEM COMPROMISED\nFinal Score: ${score}`);
                    location.reload();
                }
            });
            document.getElementById('ui').innerText = `Score: ${score} | Level: ${level}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Draw Gun
            if (gunLoaded) {
                ctx.save();
                ctx.translate(player.x + 30, player.y + 40);
                ctx.rotate(-Math.PI/2);
                ctx.drawImage(gunImg, -40, -30, 80, 60);
                ctx.restore();
            } else {
                // Fallback Gun (Green Glow Box)
                ctx.fillStyle = "#00ffcc";
                ctx.fillRect(player.x, player.y, player.w, player.h);
            }

            // 2. Draw Bullets
            ctx.fillStyle = "yellow";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // 3. Draw Aliens
            aliens.forEach(a => {
                if (alienLoaded) {
                    // Try to clip the first alien from the sheet
                    let sw = alienImg.width / 3;
                    let sh = alienImg.height / 2;
                    ctx.drawImage(alienImg, 0, 0, sw, sh, a.x, a.y, a.w, a.h);
                } else {
                    // Fallback Alien (Pulsing Red Sphere)
                    ctx.fillStyle = "#ff4444";
                    ctx.beginPath();
                    ctx.arc(a.x + 27, a.y + 27, 22, 0, Math.PI * 2);
                    ctx.fill();
                    // Add a little glow
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
        }

        function gameLoop() {
            if (!gameOver) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }

        // Just in case, update status message
        setTimeout(() => {
            if (!alienLoaded) status.innerText = "Alien image taking too long? Launch anyway!";
            else status.innerText = "Alien signal strong. Ready to launch.";
        }, 2000);

    </script>
</body>
</html>
