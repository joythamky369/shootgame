<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alien Invasion - Fast Load</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #loading-screen { text-align: center; }
        canvas { border: 1px solid #00ffcc; display: none; background: black; box-shadow: 0 0 20px #00ffcc44; }
        .btn { background: #00ffcc; color: black; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; font-weight: bold; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 id="title">INITIALIZING SYSTEMS...</h1>
        <div id="progress">Loading Assets: 0%</div>
        <button id="startBtn" class="btn">START MISSION</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const progress = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');
        const title = document.getElementById('title');

        canvas.width = 800;
        canvas.height = 600;

        // --- FAST LOADING LOGIC ---
        const assets = {
            gun: { src: 'gun.png', img: new Image(), loaded: false },
            aliens: { src: 'aliens_sheet.png', img: new Image(), loaded: false }
        };

        let loadedCount = 0;
        const total = Object.keys(assets).length;

        function assetLoaded() {
            loadedCount++;
            let percent = Math.floor((loadedCount / total) * 100);
            progress.innerText = `Loading Assets: ${percent}%`;
            
            if (loadedCount === total) {
                progress.style.display = 'none';
                title.innerText = "SYSTEMS ONLINE";
                startBtn.style.display = 'inline-block';
            }
        }

        // Initialize Loading
        for (let key in assets) {
            assets[key].img.onload = assetLoaded;
            assets[key].img.onerror = () => {
                console.error("Failed to load:", assets[key].src);
                assetLoaded(); // Continue anyway so game doesn't break
            };
            assets[key].img.src = assets[key].src + "?v=" + Date.now(); // Cache busting
        }

        // --- GAME VARIABLES ---
        let score = 0, level = 1, alienSpeed = 2.5, gameOver = false;
        const player = { x: 370, y: 500, w: 60, h: 80 };
        const bullets = [], aliens = [], keys = {};

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        startBtn.onclick = () => {
            document.getElementById('loading-screen').style.display = 'none';
            canvas.style.display = 'block';
            gameLoop();
        };

        function gameLoop() {
            if (gameOver) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 9;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += 9;
            
            if (keys['Space'] && (bullets.length === 0 || bullets[bullets.length-1].y < player.y - 120)) {
                bullets.push({x: player.x + 27, y: player.y, w: 6, h: 16});
            }

            bullets.forEach((b, i) => { b.y -= 12; if (b.y < -20) bullets.splice(i, 1); });

            if (Math.random() < 0.02 + (level * 0.005)) {
                aliens.push({x: Math.random() * (canvas.width - 50), y: -60, w: 50, h: 50});
            }

            aliens.forEach((a, i) => {
                a.y += alienSpeed;
                if (a.y > canvas.height) aliens.splice(i, 1);

                // Collisions
                bullets.forEach((b, bi) => {
                    if (b.x < a.x + a.w && b.x + b.w > a.x && b.y < a.y + a.h && b.y + b.h > a.y) {
                        aliens.splice(i, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        if (score % 100 === 0) { level++; alienSpeed += 0.4; }
                    }
                });

                if (a.x < player.x + player.w && a.x + a.w > player.x && a.y < player.y + player.h && a.y + a.h > player.y) {
                    gameOver = true;
                    alert(`MISSION FAILED\nFinal Score: ${score}\nLevel: ${level}`);
                    location.reload();
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Score
            ctx.fillStyle = "#00ffcc";
            ctx.font = "20px Courier New";
            ctx.fillText(`SCORE: ${score} | LEVEL: ${level}`, 20, 30);

            // Draw Gun
            ctx.save();
            ctx.translate(player.x + 30, player.y + 40);
            ctx.rotate(-Math.PI/2);
            // Draw original image (scaled down)
            ctx.drawImage(assets.gun.img, -40, -30, 80, 60);
            ctx.restore();

            // Draw Bullets
            ctx.fillStyle = "yellow";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Draw Aliens (Assumes a 2x3 or 1x6 sheet, grabbing the first one)
            aliens.forEach(a => {
                // Adjusting the crop to be safer for smaller resolutions
                // Grabs the top-left section (1/3rd width, 1/2 height)
                let sw = assets.aliens.img.width / 3;
                let sh = assets.aliens.img.height / 2;
                ctx.drawImage(assets.aliens.img, 0, 0, sw, sh, a.x, a.y, a.w, a.h);
            });
        }
    </script>
</body>
</html>
