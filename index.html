<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Invasion</title>
    <style>
        body { margin: 0; background-color: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: black; border: 3px solid #333; box-shadow: 0 0 20px rgba(0,255,255,0.2); cursor: crosshair; display: none; }
        #overlay { text-align: center; background: rgba(20, 20, 20, 0.9); padding: 40px; border-radius: 15px; border: 1px solid #444; }
        button { background: #008cff; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #005fa3; transform: scale(1.05); }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 24px; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="ui">Score: 0 | Level: 1</div>
    
    <div id="overlay">
        <h1>ALIEN INVASION</h1>
        <p>Use LEFT/RIGHT arrows to move. SPACE to shoot.</p>
        <div id="status">Loading assets...</div>
        <button id="startBtn" style="display:none;">START MISSION</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        canvas.width = 800;
        canvas.height = 600;

        // --- ASSET LOADING LOGIC ---
        let assetsLoaded = 0;
        const totalAssets = 2;

        const gunImg = new Image();
        gunImg.src = 'gun.png'; 
        const alienImg = new Image();
        alienImg.src = 'aliens_sheet.png';

        function checkAssets() {
            assetsLoaded++;
            if (assetsLoaded === totalAssets) {
                status.innerText = "Systems Ready!";
                startBtn.style.display = "inline-block";
            }
        }

        gunImg.onload = checkAssets;
        alienImg.onload = checkAssets;
        gunImg.onerror = () => status.innerText = "Error loading gun.png";
        alienImg.onerror = () => status.innerText = "Error loading aliens_sheet.png";

        // --- GAME STATE ---
        let score = 0;
        let level = 1;
        let alienSpeed = 2.5;
        let gameOver = false;
        let animationId;

        const player = { x: 370, y: 500, w: 60, h: 80, speed: 10 };
        const bullets = [];
        const aliens = [];
        const keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        startBtn.addEventListener('click', () => {
            overlay.style.display = "none";
            canvas.style.display = "block";
            ui.style.display = "block";
            gameLoop();
        });

        function gameLoop() {
            update();
            draw();
            if (!gameOver) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            // Movement
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;

            // Shoot (Debounced)
            if (keys['Space']) {
                if (bullets.length === 0 || bullets[bullets.length-1].y < player.y - 100) {
                    bullets.push({ x: player.x + player.w/2 - 3, y: player.y, w: 6, h: 15 });
                }
            }

            // Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 12;
                if (bullets[i].y < -20) bullets.splice(i, 1);
            }

            // Aliens Spawning
            if (aliens.length < 4 + level && Math.random() < 0.03) {
                aliens.push({ x: Math.random() * (canvas.width - 50), y: -60, w: 50, h: 50 });
            }

            // Aliens Movement & Collision
            for (let i = aliens.length - 1; i >= 0; i--) {
                let a = aliens[i];
                a.y += alienSpeed;

                // Player collision
                if (a.x < player.x + player.w && a.x + a.w > player.x && a.y < player.y + player.h && a.y + a.h > player.y) {
                    endGame();
                }

                // Bullet collision
                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (b.x < a.x + a.w && b.x + b.w > a.x && b.y < a.y + a.h && b.y + b.h > a.y) {
                        aliens.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        if (score % 100 === 0) {
                            level++;
                            alienSpeed += 0.5;
                        }
                        break; 
                    }
                }

                if (a.y > canvas.height) aliens.splice(i, 1);
            }

            ui.innerHTML = `Score: ${score} | Level: ${level}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Bullets
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Aliens (Clipped from your sheet)
            aliens.forEach(a => {
                ctx.drawImage(alienImg, 20, 20, 240, 280, a.x, a.y, a.w, a.h);
            });

            // Player (Rotated Gun)
            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            ctx.rotate(-Math.PI / 2); 
            ctx.drawImage(gunImg, -player.h/2, -player.w/2, player.h, player.w);
            ctx.restore();
        }

        function endGame() {
            gameOver = true;
            cancelAnimationFrame(animationId);
            overlay.style.display = "block";
            canvas.style.display = "none";
            ui.style.display = "none";
            status.innerHTML = `<h2 style="color:#ff4444">MISSION FAILED</h2>Final Score: ${score}<br>Level Reached: ${level}`;
            startBtn.innerText = "TRY AGAIN";
            startBtn.onclick = () => window.location.reload();
        }
    </script>
</body>
</html>
